</head>

function toStr(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function todayStr(){ return toStr(new Date()); }
function tomorrowStr(){ const d=new Date(); d.setDate(d.getDate()+1); return toStr(d); }
function formatLong(s){ const [y,m,d]=s.split(”-”); return new Date(y,m-1,d).toLocaleDateString(“fr-FR”,{weekday:“long”,day:“numeric”,month:“long”,year:“numeric”}); }
function formatShort(s){ const [y,m,d]=s.split(”-”); return new Date(y,m-1,d).toLocaleDateString(“fr-FR”,{weekday:“long”,day:“numeric”,month:“long”}); }
function generateSlots(start,end){
if(!start||!end||end<=start) return [];
const r=[];
const [sh,sm]=start.split(”:”).map(Number);
const [eh,em]=end.split(”:”).map(Number);
let cur=sh*60+sm; const endMin=eh*60+em;
while(cur+40<=endMin){ const h=Math.floor(cur/60),mn=cur%60; r.push(`${String(h).padStart(2,"0")}:${String(mn).padStart(2,"0")}`); cur+=40; }
return r;
}

// Convertit les tableaux plats en objet groupé par date
function slotsToObj(rows){ const o={}; rows.forEach(r=>{ if(!o[r.date])o[r.date]=[]; o[r.date].push(r.time); o[r.date].sort(); }); return o; }

function PinScreen({onSuccess}){

function ClientView({slots,bookings,onBook}){
const [step,setStep]=useState(1);
const [prenom,setPrenom]=useState(””);
const [tel,setTel]=useState(””);
const [calMonth,setCalMonth]=useState(()=>{const d=new Date();return new Date(d.getFullYear(),d.getMonth(),1);});
const [selDate,setSelDate]=useState(null);
const [selSlot,setSelSlot]=useState(null);

const [done,setDone]=useState(false);
const td=todayStr();
const y=calMonth.getFullYear(),m=calMonth.getMonth();
const daysCount=new Date(y,m+1,0).getDate();
const firstDay=new Date(y,m,1).getDay();
function daySlots(ds){ const all=slots[ds]||[]; const taken=bookings.filter(b=>b.date===ds).map(b=>b.time); return all.map(t=>({time:t,taken:taken.includes(t)})); }
function hasAvail(ds){ if(ds<td)return false; return (slots[ds]||[]).some(t=>!bookings.find(b=>b.date===ds&&b.time===t)); }
function validate(){ const e={}; if(!prenom.trim())e.prenom=“Votre prénom est requis”; if(!tel.trim())e.tel=“Votre numéro est requis”; else if(!/^(+?\d[\d\s-.]{7,14})$/.test(tel.trim()))e.tel=“Numéro invalide”; setErrors(e); return !Object.keys(e).length; }
async function confirm(){ await onBook({prenom:prenom.trim(),tel:tel.trim(),date:selDate,time:selSlot}); setDone(true); }
if(done) return (
<div className="client-page">
<div className=“c-card” style={{textAlign:“center”}}>
<div className="c-logo">RDV Barber</div>
<div className="success-ico">✓</div>
<h1 className="c-h1">Merci <em>{prenom}</em> !</h1>

<div className="success-box"><p>📅 {formatLong(selDate)}<br/>🕐 {selSlot} — 40 min<br/>📱 Rappel la veille au {tel}</p></div>
<p style={{fontSize:”.72rem”,color:”#9a9080”,marginTop:“1rem”,fontWeight:300}}>Un SMS de rappel vous sera envoyé la veille.</p>
<button className=“c-btn-back” style={{marginTop:“1.5rem”}} onClick={()=>{setDone(false);setStep(1);setPrenom(””);setTel(””);setSelDate(null);setSelSlot(null);}}>Prendre un autre RDV</button>
</div>
</div>
);
return (
<div className="client-page">

{errors.prenom&&<p className="c-err">{errors.prenom}</p>}

<input className=“c-input” type=“tel” placeholder=”+33 6 00 00 00 00” value={tel} onChange={e=>setTel(e.target.value)}/>

{errors.tel&&<p className="c-err">{errors.tel}</p>}

</>}

<h1 className="c-h1">Choisissez <em>une date</em></h1>
<p className="c-sub">Les jours disponibles sont mis en évidence</p>
<div className="c-div"/>
<div className="cal-nav">
<button onClick={()=>setCalMonth(new Date(y,m-1,1))}>‹</button>
<span className="cal-month">{MONTHS_FR[m]} {y}</span>
<button onClick={()=>setCalMonth(new Date(y,m+1,1))}>›</button>
</div>
<div className=“cal-grid” style={{marginBottom:“4px”}}>{DAYS_FR.map(d=><div key={d} className="cal-dname">{d}</div>)}</div>
<div className="cal-grid">
{Array.from({length:firstDay}).map((*,i)=><div key={“e”+i} className=“cal-day empty”/>)}
{Array.from({length:daysCount}).map((*,i)=>{
const day=i+1;
const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
const avail=hasAvail(ds),isSel=selDate===ds;
return <button key={ds} className={`cal-day${avail?" avail":""}${isSel?" sel":""}`} disabled={ds<td||!avail} onClick={()=>{setSelDate(ds);setSelSlot(null);setStep(3);}}>{day}</button>;
})}
</div>
<button className=“c-btn-back” style={{marginTop:“1.2rem”}} onClick={()=>setStep(1)}>← Retour</button>
</>}
{step===3&&selDate&&<>
<h1 className="c-h1">Choisissez <em>un créneau</em></h1>
<p className="c-sub">{formatLong(selDate)} — 40 min</p>
<div className="c-div"/>
{daySlots(selDate).length===0?<p className="no-slot">Aucun créneau ce jour.</p>:
<div className="slot-grid">{daySlots(selDate).map(({time,taken})=><button key={time} className={`slot-btn${taken?" taken":""}${selSlot===time?" sel":""}`} disabled={taken} onClick={()=>setSelSlot(time)}>{time}</button>)}</div>}
<button className="c-btn-primary" disabled={!selSlot} onClick={confirm}>Confirmer le rendez-vous</button>
<button className=“c-btn-back” onClick={()=>{setStep(2);setSelSlot(null);}}>← Retour</button>
</>}
</div>
</div>
);
}

function AdminView({slots,bookings,onAddSlots,onRemoveSlot,onRemoveDay,onDeleteBooking,onLogout}){
const [tab,setTab]=useState(“rdv”);
const [filter,setFilter]=useState(“upcoming”);
const [newDate,setNewDate]=useState(””);
const [newStart,setNewStart]=useState(””);
const [newEnd,setNewEnd]=useState(””);
const [sent,setSent]=useState({});
const td=todayStr(),tm=tomorrowStr();
const generated=generateSlots(newStart,newEnd);
const rangeError=newStart&&newEnd&&newEnd<=newStart;
const isBooked=(date,time)=>bookings.some(b=>b.date===date&&b.time===time);
const bookedBy=(date,time)=>bookings.find(b=>b.date===date&&b.time===time);
const upcoming=bookings.filter(b=>b.date>=td);
const past=bookings.filter(b=>b.date<td);
const tmBookings=bookings.filter(b=>b.date===tm);
const filtered=bookings.filter(b=>filter===“upcoming”?b.date>=td:filter===“past”?b.date<td:true).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
const sortedDates=Object.keys(slots).sort();
function getStatus(d){return d===td?“today”:d>td?“upcoming”:“past”;}
return (
<div className="admin-page">
<div className="a-header">
<div className="a-logo">RDV Barber — Admin</div>
<div style={{display:“flex”,alignItems:“center”,gap:“1rem”}}>
<div className="a-date">{new Date().toLocaleDateString(“fr-FR”,{weekday:“long”,day:“numeric”,month:“long”})}</div>
<button onClick={onLogout} style={{background:“none”,border:“1px solid #2a2820”,color:”#5a5040”,fontSize:”.6rem”,fontFamily:”‘Jost’,sans-serif”,fontWeight:500,letterSpacing:”.1em”,textTransform:“uppercase”,padding:”.25rem .6rem”,cursor:“pointer”}}>Sortir</button>
</div>
</div>
<div className="a-tabs">
{[{id:“rdv”,label:“Rendez-vous”},{id:“slots”,label:“Créneaux”},{id:“rappels”,label:“Rappels”+(tmBookings.length?” (”+tmBookings.length+”)”:””)}].map(t=>
<button key={t.id} className={“a-tab”+(tab===t.id?” active”:””)} onClick={()=>setTab(t.id)}>{t.label}</button>
)}
</div>
<div className="a-body">
{tab===“rdv”&&<>
<div className="stats">
<div className="stat"><div className="stat-n">{upcoming.length}</div><div className="stat-l">À venir</div></div>
<div className="stat"><div className="stat-n">{past.length}</div><div className="stat-l">Passés</div></div>
<div className="stat"><div className="stat-n">{bookings.length}</div><div className="stat-l">Total</div></div>
</div>
<div className="filters">
{[{id:“upcoming”,l:“À venir”},{id:“past”,l:“Passés”},{id:“all”,l:“Tous”}].map(f=>
<button key={f.id} className={“f-btn”+(filter===f.id?” active”:””)} onClick={()=>setFilter(f.id)}>{f.l}</button>
)}
</div>
{filtered.length===0?<div className="empty-state">Aucun rendez-vous dans cette catégorie.</div>:
filtered.map(b=>{const st=getStatus(b.date);return(
<div key={b.id} className="a-card">
<div className="a-card-row">
<div className="a-name">{b.prenom}</div>
<div style={{display:“flex”,gap:“6px”,alignItems:“center”}}>
<span className={“a-badge “+(st===“today”?“badge-today”:st===“upcoming”?“badge-up”:“badge-past”)}>{st===“today”?“Aujourd’hui”:st===“upcoming”?“À venir”:“Passé”}</span>
<button className=“a-del” onClick={()=>onDeleteBooking(b.id)}>Suppr.</button>
</div>
</div>
<div className="a-meta">📅 <strong>{formatShort(b.date)}</strong> à <strong>{b.time}</strong> — 40 min<br/>📱 {b.tel}</div>
</div>
);})}
</>}
{tab===“slots”&&<>
<h2 className="a-h1">Gérer les <em>créneaux</em></h2>
<p className="a-sub">Définissez une plage horaire — les créneaux de 40 min sont générés automatiquement</p>
<div className="range-form">
<div className="range-row">
<div className="a-field"><label className="a-label">Date</label><input className=“a-input” type=“date” value={newDate} min={td} onChange={e=>setNewDate(e.target.value)}/></div>
<div className="a-field"><label className="a-label">Disponible de</label><input className=“a-input” type=“time” value={newStart} onChange={e=>setNewStart(e.target.value)}/></div>
<div className="a-field"><label className="a-label">Jusqu’à</label><input className=“a-input” type=“time” value={newEnd} onChange={e=>setNewEnd(e.target.value)}/></div>
<button className=“a-btn-gold” disabled={!newDate||!newStart||!newEnd||!!rangeError||generated.length===0} onClick={()=>{onAddSlots(newDate,generated);setNewStart(””);setNewEnd(””);}}>Générer</button>
</div>
{rangeError&&<p className="err-msg">L’heure de fin doit être après l’heure de début.</p>}
{generated.length>0&&!rangeError&&<div className="preview"><span className="preview-label">{generated.length} créneau{generated.length>1?“x”:””} :</span><div className="preview-chips">{generated.map(t=><span key={t} className="p-chip">{t}</span>)}</div></div>}
</div>
{sortedDates.length===0?<div className="empty-state">Aucun créneau. Définissez une plage horaire ci-dessus.</div>:
sortedDates.map(date=>{const all=slots[date]||[],free=all.filter(t=>!isBooked(date,t)).length;return(
<div key={date} className="date-group">
<div className="dg-head">
<span>{formatShort(date)}</span>
<div style={{display:“flex”,alignItems:“center”,gap:”.6rem”}}>
<span style={{color:”#4a4840”,fontSize:”.6rem”}}>{free} libre(s) / {all.length}</span>
{free===all.length&&<button className=“dg-del” onClick={()=>onRemoveDay(date)}>Suppr. jour</button>}
</div>
</div>
<div className="chips">{all.map(time=>{const taken=isBooked(date,time),who=bookedBy(date,time);return(
<div key={time} className={“chip”+(taken?” taken”:””)} title={taken?“Réservé par “+who?.prenom:“Disponible”}>
<div className="chip-dot"/>{time}
{taken?<span style={{fontSize:”.68rem”,color:”#5a5040”}}>({who?.prenom})</span>:<button className=“rm-btn” onClick={()=>onRemoveSlot(date,time)}>×</button>}
</div>
);})}</div>
</div>
);})}
</>}
{tab===“rappels”&&<>
<h2 className="a-h1">Rappels <em>SMS</em></h2>
<p className="a-sub">Clients avec un rendez-vous demain — {formatShort(tm)}</p>
<div className="sms-info"><strong>Note :</strong> Cliquez sur “Copier SMS” pour générer le message pré-rempli à envoyer à chaque client.</div>
{tmBookings.length===0?<div className="empty-state">Aucun rendez-vous demain.</div>:
<div className="rem-list">{tmBookings.sort((a,b)=>a.time.localeCompare(b.time)).map(b=>{
const msg=`Bonjour ${b.prenom}, rappel de votre rendez-vous demain ${formatShort(b.date)} à ${b.time} (40 min). À bientôt !`;
const ok=sent[b.id];
return(<div key={b.id} className="rem-item">
<div><div className="rem-name">{b.prenom}</div><div className="rem-info">{b.time} — 40 min</div><div className="rem-tel">{b.tel}</div></div>
<button className={“copy-btn”+(ok?” done”:””)} onClick={()=>{if(!ok){navigator.clipboard.writeText(msg).catch(()=>{});setSent(s=>({…s,[b.id]:true}));}}}>{ok?“✓ Copié”:“Copier SMS”}</button>
</div>);
})}</div>}
{bookings.filter(b=>b.date>tm).length>0&&<>
<div style={{margin:“1.8rem 0 .8rem”,fontFamily:”‘Cormorant Garamond’,serif”,fontSize:“1.05rem”,color:”#c8a96e”}}>Prochains rappels à prévoir</div>
{[…new Set(bookings.filter(b=>b.date>tm).map(b=>b.date))].sort().slice(0,4).map(date=>
<div key={date} style={{padding:”.55rem 0”,borderBottom:“1px solid #1e1e1c”,fontSize:”.78rem”,color:”#5a5040”,fontWeight:300}}>{formatShort(date)} — {bookings.filter(b=>b.date===date).length} client(s)</div>
)}
</>}
</>}
</div>
</div>
);
}

function App(){
const [mode,setMode]=useState(“client”);
const [adminAuth,setAdminAuth]=useState(false);
const [slots,setSlots]=useState({});
const [bookings,setBookings]=useState([]);
const [loading,setLoading]=useState(true);

async function loadData(){
const {data:sData}=await sb.from(“slots”).select(”*”);
const {data:bData}=await sb.from(“bookings”).select(”*”);
if(sData) setSlots(slotsToObj(sData));
if(bData) setBookings(bData);
setLoading(false);
}

useEffect(()=>{ loadData(); },[]);

const handleBook=useCallback(async(booking)=>{
await sb.from(“bookings”).insert([booking]);
await loadData();
},[]);

const handleAddSlots=useCallback(async(date,times)=>{
const rows=times.map(time=>({date,time}));
await sb.from(“slots”).insert(rows);
await loadData();
},[]);

const handleRemoveSlot=useCallback(async(date,time)=>{
await sb.from(“slots”).delete().eq(“date”,date).eq(“time”,time);
await loadData();
},[]);

const handleRemoveDay=useCallback(async(date)=>{
await sb.from(“slots”).delete().eq(“date”,date);
await loadData();
},[]);

const handleDeleteBooking=useCallback(async(id)=>{
await sb.from(“bookings”).delete().eq(“id”,id);
await loadData();
},[]);

if(loading) return <div className="loading"><div className="loading-txt">Chargement…</div></div>;

return (
<>
<div className="mode-switch">
<button className={“mode-btn”+(mode===“client”?” active”:””)} onClick={()=>setMode(“client”)}>Client</button>
<button className={“mode-btn”+(mode===“admin”?” active”:””)} onClick={()=>setMode(“admin”)}>Admin</button>
</div>
{mode===“client”&&<ClientView slots={slots} bookings={bookings} onBook={handleBook}/>}
{mode===“admin”&&!adminAuth&&<PinScreen onSuccess={()=>setAdminAuth(true)}/>}
{mode===“admin”&&adminAuth&&<AdminView slots={slots} bookings={bookings} onAddSlots={handleAddSlots} onRemoveSlot={handleRemoveSlot} onRemoveDay={handleRemoveDay} onDeleteBooking={handleDeleteBooking} onLogout={()=>{setAdminAuth(false);setMode(“client”);}}/>}
</>
);
}

ReactDOM.createRoot(document.getElementById(“root”)).render(<App/>);
</script>

</body>
</html>
